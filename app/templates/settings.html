{% extends 'base.html' %} {% block title %}Settings - NeuroScreen{% endblock %} {% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-sm p-8 border border-slate-200">
        <h1 class="text-3xl font-bold text-slate-800 mb-6">Profile Settings</h1>
        
        <form method="POST" action="{{ url_for('settings') }}" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700">Name</label>
                <input type="text" id="username" name="username" value="{{ current_user.username }}" required class="mt-1 block w-full px-4 py-3 text-slate-900 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="age" class="block text-sm font-medium text-slate-700">Age</label>
                    <input type="number" id="age" name="age" min="1" max="120" value="{{ current_user.age or '' }}" class="mt-1 block w-full px-4 py-3 text-slate-900 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
                </div>
                <div>
                    <label for="gender" class="block text-sm font-medium text-slate-700">Biological Sex</label>
                    <select id="gender" name="gender" class="mt-1 block w-full px-4 py-3 text-slate-900 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <option value="">Select...</option>
                        <option value="Male" {% if current_user.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if current_user.gender == 'Female' %}selected{% endif %}>Female</option>
                    </select>
                </div>
            </div>

            <div class="pt-6 mt-6 border-t border-slate-100 flex justify-end gap-4">
                <a href="{{ url_for('dashboard') }}" class="px-6 py-3 border border-slate-300 shadow-sm text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500">Cancel</a>
                <button type="submit" class="px-6 py-3 border border-transparent shadow-sm text-sm font-medium rounded-lg text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
