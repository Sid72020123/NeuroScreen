{% extends 'base.html' %} {% block title %}Register - NeuroScreen{% endblock %} {% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-md mx-auto mt-8 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-2xl font-bold text-center text-slate-800">Create Your Account</h2>
        <p class="mt-2 text-sm text-center text-slate-500">Begin your journey with NeuroScreen.</p>

        <form method="POST" action="{{ url_for('register') }}" class="mt-8 space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700">Name</label>
                <div class="mt-1">
                    <input
                        id="username"
                        name="username"
                        type="text"
                        required
                        autocomplete="username"
                        class="w-full px-4 py-3 text-slate-900 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                <div class="mt-1">
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        autocomplete="new-password"
                        class="w-full px-4 py-3 text-slate-900 bg-white border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
                </div>
            </div>

            <div>
                <button
                    type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500">
                    Create Account
                </button>
            </div>
        </form>

        <p class="mt-6 text-sm text-center text-slate-500">
            Already have an account?
            <a href="{{ url_for('login') }}" class="font-medium text-teal-600 hover:text-teal-500"> Sign In </a>
        </p>
    </div>
</div>
{% endblock %}
